      <stop offset="0" stop-color="#16202a"/>
      <stop offset="0.55" stop-color="#101820"/>
      <stop offset="1" stop-color="#0c1218"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
